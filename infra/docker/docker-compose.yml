services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../../apps/web/.env
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../apps/api/.env
      - ../../.env
    ports:
      - "4000:4000"
